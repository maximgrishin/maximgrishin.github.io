<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="../third-party/pyodide/pyodide.js"></script>
</head>
<body>
<div id="log"></div>
<script src="../pui/pui.js"></script>
<script>
async function main() {
	let pyodide = await loadPyodide();
	pyodide.FS.mkdir("/home/pyodide/pui");
	pyodide.FS.writeFile("/home/pyodide/pui/__init__.py", await (await fetch("../pui/__init__.py")).text());
	pyodide.FS.writeFile("/home/pyodide/pui/pui_io.py", await (await fetch("../pui/pui_io_js.py")).text());
	pyodide.runPython(await (await fetch("__main__.py")).text());
	await pyodide.globals.get("pui")._main();
}
main();
</script>
</body>
</html>
